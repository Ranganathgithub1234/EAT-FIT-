<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="calculator">
        <input type="text"  id="display" readonly >
        <div class="btns">
            <button class="btn" onclick="addtodiplay('+')" >+</button>
            <button onclick="addtodiplay('7')" >7</button>
            <button onclick="addtodiplay('8')">8</button>
            <button onclick="addtodiplay('9')" >9</button>
            <button class="btn" onclick="addtodiplay('-')" >-</button>
            <button onclick="addtodiplay('4')" >4</button>
            <button onclick="addtodiplay('5')" >5</button>
            <button onclick="addtodiplay('6')" >6</button>
            <button class="btn" onclick="addtodiplay('*')" >*</button>
            <button onclick="addtodiplay('1')" >1</button>
            <button  onclick="addtodiplay('2')">2</button>
            <button  onclick="addtodiplay('3')">3</button>
            <button class="btn" onclick="addtodiplay('/')" >/</button>
            <button onclick="addtodiplay('0')">0</button>
            <button onclick="addtodiplay('.')" >.</button>
            <button onclick="calculate()" >=</button>
            <button class="btn" onclick="clear1()" >c</buttons>
        </div>
    </div>
    <script>
        const display= document.getElementById("display");
        function addtodiplay(input){
            display.value+=input;
        }
        function calculate(){
            try{
                display.value= eval(display.value);
            }catch(error){
                display.value="error";

            }
        }
        function clear1(){
            display.value="";
        }

    </script>
    
</body>
</html>
